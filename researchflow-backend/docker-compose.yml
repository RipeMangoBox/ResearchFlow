version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: researchflow
      POSTGRES_USER: rf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 1280M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rf -d researchflow"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru

  # grobid:  # Disabled — VLM page scan replaces GROBID formula extraction
  #   image: lfoppiano/grobid:0.8.1
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:8070:8070"
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 2048M
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    volumes:
      - ./backend:/app/backend
      - ./exports:/app/exports
      - ./storage:/app/storage
      - ./obsidian-vault:/obsidian-vault
      - ./paperAnalysis:/paperAnalysis
    ports:
      - "127.0.0.1:8000:8000"
    deploy:
      resources:
        limits:
          memory: 512M
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    volumes:
      - ./backend:/app/backend
      - ./exports:/app/exports
    deploy:
      resources:
        limits:
          memory: 2048M
    environment:
      GROBID_URL: ""  # GROBID disabled — graceful fallback in parse_service
    command: arq backend.workers.arq_app.WorkerSettings

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 256M

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    ports:
      - "0.0.0.0:8001:8001"
    deploy:
      resources:
        limits:
          memory: 256M
    command: python -m backend.mcp.server --sse --port 8001

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
